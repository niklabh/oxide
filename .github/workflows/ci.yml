name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libatk1.0-dev \
            libglib2.0-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libasound2-dev \
            pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (browser)
        run: cargo clippy -p oxide-browser -- -D warnings

      - name: Build
        run: cargo build -p oxide-browser

      - name: Test (browser)
        run: cargo test -p oxide-browser

  check-sdk:
    name: Check SDK (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Check SDK
        run: cargo check -p oxide-sdk --target wasm32-unknown-unknown

      - name: Check example
        run: cargo check -p hello-oxide --target wasm32-unknown-unknown
