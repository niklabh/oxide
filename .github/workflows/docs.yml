name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libatk1.0-dev \
            libglib2.0-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libasound2-dev \
            pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libswscale-dev libswresample-dev

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: |
          cargo doc --no-deps \
            -p oxide-docs \
            -p oxide-sdk \
            -p oxide-browser
        env:
          RUSTDOCFLAGS: >-
            --html-in-header oxide-docs/rustdoc-header.html
            -Z unstable-options
            --default-theme dark

      - name: Create landing page
        run: cp oxide-docs/index.html target/doc/index.html

      - name: Add .nojekyll
        run: touch target/doc/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
