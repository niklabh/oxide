name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: oxide

jobs:
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute new version
        id: bump
        run: |
          current=$(grep '^version' oxide-browser/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r major minor patch <<< "$current"

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumping $current -> $new_version (${{ inputs.bump }})"

      - name: Update Cargo.toml versions
        run: |
          version="${{ steps.bump.outputs.new_version }}"
          for f in oxide-browser/Cargo.toml oxide-sdk/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"${version}\"/" "$f"
          done

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oxide-browser/Cargo.toml oxide-sdk/Cargo.toml
          git commit -m "release: v${{ steps.bump.outputs.new_version }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD --tags

  build:
    name: Build (${{ matrix.target }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: oxide-linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: oxide-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: oxide-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libssl-dev libgtk-3-dev libatk1.0-dev \
            libglib2.0-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libasound2-dev \
            pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev \
            libv4l-dev libudev-dev

      # ffmpeg-sys-next falls back to pkg-config for libavutil; runners do not ship FFmpeg.
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install ffmpeg pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig" >> "$GITHUB_ENV"

      # MSVC: ffmpeg-sys-next uses vcpkg::find_package("ffmpeg") before pkg-config.
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg $root
          & "$root/bootstrap-vcpkg.bat"
          & "$root/vcpkg.exe" install ffmpeg:x64-windows
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$root"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=x64-windows"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p oxide-browser --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Oxide ${{ needs.version.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
